<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willixau</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        .texte-bas-gauche {
            /* Fixe la position par rapport à la fenêtre */
            position: fixed;
            /* Le place tout en bas de l'écran */
            bottom: 20px;
            /* Le place sur le côté gauche */
            left: 20px;
            /* Ajoute un peu de couleur et de style pour la lisibilité */
            color: #333;
            font-family: Arial, sans-serif;
            font-size: 16px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            /* S'assure que le texte passe au-dessus des autres éléments */
            z-index: 1000;
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="https://video.wixstatic.com/video/08b457_d1812cafa79e4d05a5413608da10fb0d/1080p/mp4/file.mp4" type="video/mp4">
    </video>
<nav class="navbar-container">
    <div class="nav-group">
        <button class="nav-btn">Me <i class="fa-solid fa-chevron-down"></i></button>
        <button class="nav-btn">Solutions <i class="fa-solid fa-chevron-down"></i></button>
        <button class="nav-btn">Soutien</i></button>
        <button class="nav-btn">Donate</i></button>
    </div>

    <div class="nav-icons">
        <button class="icon-btn"><i class="fa-solid fa-envelope"></i></button>
    </div>
</nav>
<section class="hero">
    <div class="views-wrapper" id="views-wrapper">
        <div id="home-view" class="view">
            <h1 id="Willixau-title">Willixau</h1>
            <p id="Willixau-description">00Willixau00</p>
            <button id="btn-explore" class="cta-button">Interact to begin</button>
        </div>

        <div id="menu-view" class="view">
            <button class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="OptionsTitle">Menu</h2>
            <div class="option-box">About</div>
            <div class="option-box">Projects</div>
            <div class="option-box">Social Media and platforms</div>
            <div class="option-box">School Ressources</div>
            <div class="option-box">Support</div>
            <div class="option-box">Donate</div>
            <div class="option-box">Contact</div>
        </div>
    </div>
</section>
<div class="texte-bas-gauche">
        Ver 0.3.0
    </div>
<script src="script.js"></script>
</body>
</html>
